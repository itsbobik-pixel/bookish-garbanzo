<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hostel Board</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;
  --surface:#fff;
  --border:#e5e3de;
  --text:#181816;
  --muted:#9a9891;
  --radius:10px;
  --s-checkin:#f0d800;
  --s-unpaid:#e63c3c;
  --s-change:#17c4aa;
  --s-paid-noci:#3a6fd4;
  --s-cancel:#d0cfc9;
  --s-allgood:#e8f9ee;
  --sticky-w:110px;
  --header-h:208px;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.hero-header{position:sticky;top:0;z-index:50;height:170px;overflow:hidden;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,0.38)}
.hero-bg svg{width:100%;height:100%;display:block}
.hero-content{z-index:1;display:flex;flex-direction:column;align-items:center;gap:4px;position:absolute;left:50%;transform:translateX(-50%)}
.hero-logo{display:flex;align-items:center;gap:10px}
.hero-name{font-size:28px;font-weight:700;color:white;letter-spacing:.02em;text-shadow:0 2px 12px rgba(0,0,0,.4)}
.hero-sub{font-size:11px;color:rgba(255,255,255,.7);letter-spacing:.12em;text-transform:uppercase}
.hero-nav{z-index:1;display:flex;align-items:center;gap:10px;margin-left:auto}
.hero-tabs{display:flex;gap:2px;background:rgba(0,0,0,.2);border-radius:8px;padding:3px}
.hero-tab{padding:5px 16px;font-size:12px;font-weight:500;border:none;border-radius:6px;cursor:pointer;background:none;color:rgba(255,255,255,.7)}
.hero-tab.active{background:rgba(255,255,255,.2);color:white}
.period-nav{display:flex;align-items:center;gap:6px}
.period-nav button{border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.85);line-height:1}
.period-nav button:hover{background:rgba(255,255,255,.2)}
.period-nav span{font-size:12px;color:rgba(255,255,255,.9);min-width:150px;text-align:center}
.nav-btn{padding:6px 13px;font-size:12px;font-weight:500;border:1px solid rgba(255,255,255,.4);border-radius:7px;cursor:pointer;background:rgba(255,255,255,.15);color:white}
.nav-btn:hover{background:rgba(255,255,255,.25)}

/* LEGEND */
.legend-bar{display:flex;gap:10px;padding:7px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center;justify-content:center}
.leg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted)}
.leg-dot{width:12px;height:12px;border-radius:3px;border:1px solid rgba(0,0,0,.1);flex-shrink:0}

/* APP LAYOUT — 2 columns: table left, panels right */
.app-layout{display:flex;align-items:flex-start;gap:12px;padding:12px 24px 80px 24px}
.main-content{flex:1;min-width:0}
.right-col{
  width:230px;min-width:230px;
  position:sticky;
  top:calc(var(--header-h) + 4px);
  max-height:calc(100vh - var(--header-h) - 8px);
  display:flex;flex-direction:column;gap:8px;
  padding-top:0;
}

/* SIDE PANELS */
.side-panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
  min-height:0;
}
.panel-arrivals{flex:0 0 auto;max-height:240px}
.panel-guidelines{flex:1;min-height:0}
.panel-title{
  padding:8px 12px;
  font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:.07em;
  color:var(--text);
  border-bottom:1px solid var(--border);
  background:var(--bg);
  flex-shrink:0;
  display:flex;align-items:center;
}
.panel-title-text{flex:1}
.panel-full-btn{
  background:none;border:none;cursor:pointer;
  font-size:14px;padding:1px 3px;opacity:.5;
  transition:opacity .15s;line-height:1;
}
.panel-full-btn:hover{opacity:1}
.gl-nav-btn{
  background:none;border:none;cursor:pointer;
  font-size:13px;padding:1px 4px;opacity:.45;
  transition:opacity .15s;line-height:1;color:var(--text);
}
.gl-nav-btn:hover{opacity:1}
.panel-body{flex:1;overflow-y:auto;padding:8px}
.panel-empty{font-size:12px;color:var(--muted);text-align:center;padding:24px 8px;line-height:1.5}

/* GUIDELINES */
.gl-block{margin-bottom:10px}
.gl-block-label{
  font-size:10px;font-weight:700;letter-spacing:.07em;
  text-transform:uppercase;color:var(--muted);
  padding:2px 0 5px;
}
.gl-block.current .gl-block-label{color:#3a6fd4}
.gl-block.next-up .gl-block-label{color:#9a9891}
.gl-task{
  display:flex;align-items:flex-start;gap:6px;
  font-size:11.5px;line-height:1.45;color:var(--text);
  padding:4px 0;border-bottom:1px solid var(--border);
  cursor:pointer;
}
.gl-task:last-child{border-bottom:none}
.gl-task.done{color:var(--muted);text-decoration:line-through}
.gl-check{
  width:14px;height:14px;border-radius:3px;
  border:1.5px solid #ccc;flex-shrink:0;margin-top:1px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:transparent;transition:all .12s;
}
.gl-task.done .gl-check{background:#17c4aa;border-color:#17c4aa;color:#fff}
.gl-block.current .gl-check{border-color:#3a6fd4}
.gl-next-label{
  font-size:10px;color:var(--muted);font-style:italic;
  padding:6px 0 2px;
}
.gl-checkin-card{
  background:#fffbe6;border:1px solid #f0d800;
  border-radius:8px;padding:8px 10px;margin-bottom:8px;
}
.gl-checkin-card .gl-block-label{color:#8a7000;margin-bottom:4px}
.gl-checkout-card{
  background:#f0fff8;border:1px solid #17c4aa;
  border-radius:8px;padding:8px 10px;margin-bottom:8px;
}
.gl-checkout-card .gl-block-label{color:#0a6b5a;margin-bottom:4px}

/* ARRIVALS PANEL */
.arrival-item{
  padding:8px 10px;border-radius:7px;
  margin-bottom:6px;background:var(--bg);
  border-left:3px solid var(--border);
  cursor:pointer;transition:filter .12s;
}
.arrival-item:hover{filter:brightness(.95)}
.arrival-item.arr-future{border-left-color:#3a6fd4}
.arrival-item.arr-soon{border-left-color:#f0d800}
.arrival-item.arr-arrived{border-left-color:#17c4aa;opacity:.6}
.arrival-item.arr-unknown{border-left-color:#d0cfc9}
.arr-time{font-size:15px;font-weight:700;color:var(--text);line-height:1}
.arr-name{font-size:12px;font-weight:500;color:var(--text);margin-top:2px;display:flex;align-items:center;gap:4px}
.arr-room{font-size:10px;color:var(--muted);margin-top:1px}
.arr-divider{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;padding:6px 2px 3px;border-top:1px solid var(--border);margin-top:6px;margin-bottom:4px}

/* WEEK TABLE */
.week-wrap{padding:0;overflow-x:auto;border-top:1px solid var(--border);scrollbar-width:none}
.week-wrap::-webkit-scrollbar{display:none}
.week-table{border-collapse:collapse;width:auto}

.week-table th,.week-table td{border-right:1px solid var(--border);border-bottom:1px solid var(--border)}

/* sticky left column */
.col-sticky{position:sticky;left:0;z-index:10;background:var(--surface);width:var(--sticky-w);min-width:var(--sticky-w);max-width:var(--sticky-w)}
thead .col-sticky{z-index:11}

/* day headers */
.th-day{padding:9px 12px;height:54px;vertical-align:middle;min-width:120px;background:var(--surface)}
.th-day.today{background:#f0ede8}
.th-weekday{font-size:11px;color:var(--muted);display:block}
.th-date{font-size:15px;font-weight:600;display:block}
.th-corner{height:54px;border-bottom:2px solid var(--border) !important}

/* room header row */
.room-row-th{
  background:var(--bg);
  border-top:2px solid var(--border);
  border-bottom:1px solid var(--border);
  padding:4px 10px;
  font-size:11px;font-weight:700;color:var(--text);
  letter-spacing:.06em;text-transform:uppercase;
  white-space:nowrap;height:28px;
}
.room-row-sep{border-top:2px solid var(--border) !important;height:28px;padding:0}
.room-del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:0 0 0 6px;line-height:1;vertical-align:middle}
.room-del-btn:hover{color:#e63c3c}

/* bed label */
.bed-label-th{
  padding:0 10px;font-size:11px;color:var(--muted);
  height:76px;vertical-align:middle;
  background:var(--surface);
}
.bed-label-th.last-bed{border-bottom:2px solid var(--border) !important}

/* slot cells */
.slot-td{padding:0;vertical-align:top;height:76px;min-width:120px}
.slot-td.last-bed{border-bottom:2px solid var(--border) !important}

.slot-cell{
  width:100%;height:76px;position:relative;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  padding:4px 8px;
  transition:filter .12s;
}
.slot-cell:hover{filter:brightness(.95)}
.slot-cell.s-empty{background:#fff;align-items:center}
.slot-cell.s-checkin{background:var(--s-checkin)}
.slot-cell.s-unpaid{background:var(--s-unpaid)}
.slot-cell.s-change{background:var(--s-change)}
.slot-cell.s-paid-noci{background:var(--s-paid-noci)}
.slot-cell.s-cancel{background:var(--s-cancel)}
.slot-cell.s-allgood{background:var(--s-allgood)}

/* PLUS button (empty cell) */
.cell-plus{
  width:34px;height:34px;border-radius:50%;
  border:2px dashed #ccc;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:#ccc;line-height:1;
  transition:all .15s;user-select:none;
}
.slot-cell.s-empty:hover .cell-plus{border-color:#999;color:#999;background:rgba(0,0,0,.04)}

/* occupied cell layout */
.cell-guest-name{
  font-size:15px;font-weight:700;text-align:center;
  max-width:100%;overflow:hidden;word-break:break-word;
  color:var(--text);line-height:1.2;padding:0 4px;
}
.cell-flag{
  position:absolute;top:5px;right:6px;
  font-size:16px;line-height:1;
}
.cell-nat-text{
  position:absolute;top:6px;right:6px;
  font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.04em;
}
.cell-arrival{
  position:absolute;bottom:5px;left:0;right:0;
  text-align:center;font-size:11px;font-weight:500;color:var(--text);opacity:.7;
}

/* text colors per status */
.slot-cell.s-unpaid .cell-guest-name,
.slot-cell.s-paid-noci .cell-guest-name{color:#fff}
.slot-cell.s-unpaid .cell-arrival,
.slot-cell.s-paid-noci .cell-arrival{color:rgba(255,255,255,.8)}
.slot-cell.s-unpaid .cell-nat-text,
.slot-cell.s-paid-noci .cell-nat-text{color:rgba(255,255,255,.7)}
.slot-cell.s-change .cell-guest-name{color:#0a6b5a}
.slot-cell.s-checkin .cell-guest-name{color:#6b5800}
.slot-cell.s-checkin .cell-arrival{color:#6b5800;opacity:.8}
.slot-cell.s-cancel .cell-guest-name{color:#555}
.slot-cell.s-allgood .cell-guest-name{color:#166534}

/* note icon */
.cell-note-btn{
  background:none;border:none;cursor:pointer;
  padding:1px;line-height:1;
  position:absolute;top:4px;left:5px;
  opacity:.22;transition:opacity .15s;
}
.cell-note-btn:hover{opacity:.8}
.cell-note-btn.has-notes{opacity:1}
.note-red-dot{
  width:6px;height:6px;border-radius:50%;
  background:#e63c3c;border:1.5px solid #fff;
  position:absolute;top:-1px;right:-1px;display:none;
}
.cell-note-btn.has-notes .note-red-dot{display:block}
.slot-cell.s-unpaid .cell-note-btn,
.slot-cell.s-paid-noci .cell-note-btn{opacity:.4}
.slot-cell.s-unpaid .cell-note-btn.has-notes,
.slot-cell.s-paid-noci .cell-note-btn.has-notes{opacity:1}

/* MONTH */
.month-wrap{padding:0 0 40px;display:flex;flex-direction:column;gap:12px}
.month-room{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.month-room-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.month-room-name{font-size:13px;font-weight:600;flex:1}
.month-room-sub{font-size:11px;color:var(--muted)}
.month-cal{overflow-x:auto}
.month-table{border-collapse:collapse;min-width:100%}
.month-table th{padding:5px 3px;font-size:10px;color:var(--muted);font-weight:500;text-align:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-width:26px}
.month-table th.today-col{color:var(--text);font-weight:700;background:#f0ede8}
.month-table td{padding:0;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.slot-col-sticky{padding:4px 8px;font-size:10px;color:var(--muted);background:var(--surface);white-space:nowrap;position:sticky;left:0;z-index:5;border-right:1px solid var(--border)}
.month-dot{width:100%;height:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.month-dot:hover{filter:brightness(.88)}
.month-dot span{font-size:9px;font-weight:700;color:rgba(0,0,0,.4);max-width:24px;overflow:hidden;white-space:nowrap}
.md-checkin{background:var(--s-checkin)}.md-unpaid{background:var(--s-unpaid)}
.md-change{background:var(--s-change)}.md-paid-noci{background:var(--s-paid-noci)}
.md-cancel{background:var(--s-cancel)}.md-allgood{background:var(--s-allgood)}
.md-empty{background:#fff}.today-bg{background:#f0ede8}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:14px;padding:1.4rem;width:100%;max-width:340px;box-shadow:0 12px 40px rgba(0,0,0,.15)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1.1rem}
.field{margin-bottom:11px}
.field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.field input,.field select{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);font-family:inherit;appearance:none;-webkit-appearance:none}
.field input:focus,.field select:focus{outline:none;border-color:#3a6fd4}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.2rem;align-items:center}
.btn{padding:7px 15px;font-size:13px;font-weight:500;border-radius:8px;border:1px solid var(--border);cursor:pointer;background:none;color:var(--text)}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn-primary:hover{background:#333}
.btn-danger{background:none;color:#e63c3c;border-color:#f5c0c0}
.btn-danger:hover{background:#fff5f5}

/* SLOT MODAL */
.slot-modal{max-width:380px;padding:0;overflow:hidden}
.slot-modal-top{padding:16px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.slot-name-inp{flex:1;font-size:18px;font-weight:700;border:none;outline:none;background:transparent;color:var(--text);font-family:inherit;padding:2px 0}
.slot-name-inp::placeholder{color:#ccc;font-weight:400;font-size:15px}
.modal-x{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1;padding:2px 4px}
.modal-x:hover{color:var(--text)}
.slot-fields{padding:12px 16px 4px}
.slot-fields .field{margin-bottom:9px}
.extra-inp{width:100%;margin-top:5px;padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);outline:none}
.extra-inp:focus{border-color:#3a6fd4}
.slot-notes-section{padding:0 16px 12px}
.slot-notes-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;padding-top:4px;border-top:1px solid var(--border)}
.slot-notes-list{max-height:120px;overflow-y:auto;margin-bottom:7px}
.slot-note-item{background:var(--bg);border-radius:7px;padding:7px 10px;margin-bottom:5px;position:relative;padding-right:26px}
.slot-note-text{font-size:12px;line-height:1.45;color:var(--text);white-space:pre-wrap}
.slot-note-time{font-size:10px;color:var(--muted);margin-top:2px}
.slot-note-del{position:absolute;top:6px;right:7px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;line-height:1;opacity:0}
.slot-note-item:hover .slot-note-del{opacity:1}
.slot-note-del:hover{color:#e63c3c}
.slot-notes-empty{font-size:12px;color:var(--muted);text-align:center;padding:10px 0}
.slot-notes-add{display:flex;gap:6px}
.slot-notes-add textarea{flex:1;padding:7px 9px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:inherit;background:var(--bg);color:var(--text);resize:none;height:52px;outline:none}
.slot-notes-add textarea:focus{border-color:#3a6fd4}
.slot-notes-add button{padding:7px 13px;background:var(--text);color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-weight:500;align-self:flex-end}
.slot-notes-add button:hover{background:#333}
.slot-modal-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
</style>
</head>
<body>

<div class="hero-header">
  <div class="hero-bg" style="background:url('terrace.jpg') center 20%/cover no-repeat;"></div>
  <div class="hero-content">
    <img src="logo.png" alt="Costello" style="height:90px;filter:brightness(0) invert(1);drop-shadow(0 2px 8px rgba(0,0,0,0.4))">
  </div>
  <div class="hero-nav">
    <div class="hero-tabs">
      <button class="hero-tab active" onclick="switchView('week')">Week</button>
      <button class="hero-tab" onclick="switchView('month')">Month</button>
    </div>
    <div class="period-nav">
      <button onclick="navPrev()">‹</button>
      <span id="period-label"></span>
      <button onclick="navNext()">›</button>
    </div>
    <button class="nav-btn" onclick="openAddRoom()">+ Room</button>
  </div>
</div>

<div class="legend-bar">
  <span class="leg"><span class="leg-dot" style="background:#f0d800"></span>Check-in (not paid)</span>
  <span class="leg"><span class="leg-dot" style="background:#e63c3c"></span>Not paid</span>
  <span class="leg"><span class="leg-dot" style="background:#17c4aa"></span>Change room</span>
  <span class="leg"><span class="leg-dot" style="background:#3a6fd4"></span>Paid, not checked in</span>
  <span class="leg"><span class="leg-dot" style="background:#d0cfc9"></span>Cancellation / leaving sooner</span>
  <span class="leg"><span class="leg-dot" style="background:#e8f9ee;border:1px solid #86efac"></span>All good ✓</span>
</div>

<!-- 2-column layout -->
<div class="app-layout">

  <!-- MAIN: table -->
  <main class="main-content">
    <div id="view-week">
      <div class="week-wrap"><div id="week-table"></div></div>
    </div>
    <div id="view-month" style="display:none">
      <div class="month-wrap" id="month-wrap"></div>
    </div>
  </main>

  <!-- RIGHT COL: Arrivals + Guidelines stacked -->
  <div class="right-col">
    <aside class="side-panel panel-arrivals">
      <div class="panel-title"><span class="panel-title-text">Today's Arrivals</span></div>
      <div class="panel-body" id="arrivals-body"></div>
    </aside>
    <aside class="side-panel panel-guidelines">
      <div class="panel-title">
        <span class="panel-title-text" style="flex:none">Guidelines</span><button class="gl-nav-btn" onclick="glNav(-1)" title="Previous block">&#8592;</button><button class="gl-nav-btn" onclick="glNav(1)" title="Next block">&#8594;</button>
        <span style="flex:1"></span>
        <button class="panel-full-btn" onclick="openFullGuidelines()" title="Show full guidelines">📋</button>
      </div>
      <div class="panel-body" id="guidelines-body"></div>
    </aside>
  </div>

</div>

<!-- Full Guidelines Modal -->
<div class="overlay" id="full-gl-modal">
  <div class="modal" style="max-width:600px;max-height:85vh;overflow-y:auto;padding:0">
    <div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--surface);z-index:1">
      <span style="font-size:15px;font-weight:700;flex:1">Costello Guidelines</span>
      <button class="modal-x" onclick="closeModal('full-gl-modal')">×</button>
    </div>
    <div id="full-gl-body" style="padding:16px"></div>
  </div>
</div>

<!-- Slot modal -->
<div class="overlay" id="slot-modal">
  <div class="modal slot-modal">
    <div class="slot-modal-top">

let rooms=[], cells={}, notes={}, glDone={}, weekOff=0, monthOff=0, view='week', currentSlotKey=null, glOffset=0;

function load(){
  try{const r=localStorage.getItem('hb7_rooms');if(r)rooms=JSON.parse(r);}catch{}
  try{const r=localStorage.getItem('hb7_cells');if(r)cells=JSON.parse(r);}catch{}
  try{const r=localStorage.getItem('hb7_notes');if(r)notes=JSON.parse(r);}catch{}
  try{const r=localStorage.getItem('hb7_gl_done');if(r)glDone=JSON.parse(r);}catch{}
  if(!rooms.length) rooms=[{id:'r1',name:'Room 1',beds:4},{id:'r2',name:'Room 2',beds:4}];
}
function save(){
  try{localStorage.setItem('hb7_rooms',JSON.stringify(rooms));}catch{}
  try{localStorage.setItem('hb7_cells',JSON.stringify(cells));}catch{}
  try{localStorage.setItem('hb7_notes',JSON.stringify(notes));}catch{}
  try{localStorage.setItem('hb7_gl_done',JSON.stringify(glDone));}catch{}
}
function p2(n){return String(n).padStart(2,'0');}
function ds(d){return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function fmt(d){return`${p2(d.getDate())}/${p2(d.getMonth()+1)}`;}
function isToday(d){return ds(d)===ds(new Date());}
function ck(rid,slot,datestr){return`${rid}-${slot}-${datestr}`;}
function gc(key){return cells[key]||{name:'',status:'',arrival:'',nat:''};}
function gn(key){return notes[key]||[];}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function flagFor(natVal){return FLAG_MAP[natVal]||'';}
function statusClass(s){return s?`s-${s}`:'s-empty';}

/* arrival time helpers */
function parseArrivalMinutes(arrival){
  if(!arrival||arrival==='arrived') return null;
  const m=arrival.match(/^(\d{1,2}):(\d{2})$/);
  if(!m) return null;
  return parseInt(m[1])*60+parseInt(m[2]);
}
function shouldShowArrival(dateStr, arrival){
  if(!arrival||arrival===''||arrival==='arrived') return false;
  const today=ds(new Date());
  if(dateStr<today) return false;
  if(dateStr>today) return true;
  // today: show only if time hasn't passed yet
  const mins=parseArrivalMinutes(arrival);
  if(mins===null) return true; // custom text, show it
  const now=new Date();
  const nowMins=now.getHours()*60+now.getMinutes();
  return nowMins<mins;
}

/* CELL HTML */
function cellHtml(key, dateStr){
  const c=gc(key);
  const hasNotes=gn(key).length>0;
  const isEmpty=!c.name&&!c.status;

  if(isEmpty){
    return`<div class="slot-cell s-empty" onclick="openSlotModal('${key}')"><div class="cell-plus">+</div></div>`;
  }

  const flag=flagFor(c.nat||'');
  const customNat=(c.nat&&!FLAG_MAP[c.nat]&&c.nat!=='')? c.nat:'';
  const showArrival=shouldShowArrival(dateStr, c.arrival);

  return`<div class="slot-cell ${statusClass(c.status)}" onclick="openSlotModal('${key}')">
    <button class="cell-note-btn${hasNotes?' has-notes':''}" onclick="event.stopPropagation();openSlotModal('${key}')" title="Notes">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block">
        <rect x="1" y="1" width="14" height="10" rx="3" fill="#f5c800" stroke="#555" stroke-width="1.5"/>
        <polygon points="3,11 7,11 5,14" fill="#f5c800" stroke="#555" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
      <div class="note-red-dot"></div>
    </button>
    ${flag?`<span class="cell-flag">${flag}</span>`:''}
    ${customNat?`<span class="cell-nat-text">${esc(customNat)}</span>`:''}
    <span class="cell-guest-name">${esc(c.name)||'—'}</span>
    ${showArrival?`<span class="cell-arrival">✈ ${esc(c.arrival)}</span>`:''}
  </div>`;
}

/* WEEK */
function weekDays(){
  const n=new Date(),m=new Date(n);
  m.setDate(n.getDate()-3+weekOff*7);m.setHours(0,0,0,0);
  return Array.from({length:14},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d;});
}

function renderWeek(){
  const days=weekDays();
  document.getElementById('period-label').textContent=`${fmt(days[0])} – ${fmt(days[13])} · ${days[0].getFullYear()}`;

  if(!rooms.length){
    document.getElementById('week-table').innerHTML=`<div style="padding:60px 20px;text-align:center;color:var(--muted)"><p style="font-size:15px;color:var(--text);margin-bottom:6px">No rooms yet</p>Click "+ Room" to get started</div>`;
    return;
  }

  let h=`<table class="week-table"><thead><tr>`;
  h+=`<th class="col-sticky th-corner"></th>`;
  days.forEach(d=>{
    h+=`<th class="th-day${isToday(d)?' today':''}"><span class="th-weekday">${DAYS[d.getDay()]}</span><span class="th-date">${fmt(d)}</span></th>`;
  });
  h+=`</tr></thead><tbody>`;

  rooms.forEach(r=>{
    h+=`<tr><td class="col-sticky room-row-th">${esc(r.name)}<button class="room-del-btn" onclick="deleteRoom('${r.id}')">×</button></td><td colspan="7" class="room-row-sep"></td></tr>`;
    for(let s=0;s<r.beds;s++){
      const isLast=s===r.beds-1;
      h+=`<tr><td class="col-sticky bed-label-th${isLast?' last-bed':''}">Bed ${s+1}</td>`;
      days.forEach(d=>{
        const dstr=ds(d),key=ck(r.id,s,dstr);
        h+=`<td class="slot-td${isLast?' last-bed':''}">${cellHtml(key,dstr)}</td>`;
      });
      h+=`</tr>`;
    }
  });

  h+=`</tbody></table>`;
  document.getElementById('week-table').innerHTML=h;
}

/* ARRIVALS PANEL */
function renderArrivals(){
  const today=ds(new Date());
  const now=new Date();
  const nowMins=now.getHours()*60+now.getMinutes();

  const timed=[],arrived=[],unknown=[];

  rooms.forEach(r=>{
    for(let s=0;s<r.beds;s++){
      const key=ck(r.id,s,today);
      const c=gc(key);
      if(!c.name) continue;
      const entry={key,c,roomName:r.name,bed:s+1,mins:parseArrivalMinutes(c.arrival)};
      if(c.arrival==='arrived') arrived.push(entry);
      else if(entry.mins!==null) timed.push(entry);
      else unknown.push(entry);
    }
  });

  timed.sort((a,b)=>a.mins-b.mins);

  const el=document.getElementById('arrivals-body');
  if(!timed.length&&!arrived.length&&!unknown.length){
    el.innerHTML='<div class="panel-empty">No guests today</div>';
    return;
  }

  let h='';

  timed.forEach(e=>{
    const past=e.mins<nowMins;
    h+=`<div class="arrival-item ${past?'arr-arrived':'arr-future'}" onclick="openSlotModal('${e.key}')">
      <div class="arr-time" style="${past?'opacity:.5;text-decoration:line-through':''}">${e.c.arrival}</div>
      <div class="arr-name">${flagFor(e.c.nat||'')} ${esc(e.c.name)}</div>
      <div class="arr-room">${esc(e.roomName)} · Bed ${e.bed}</div>
    </div>`;
  });

  if(arrived.length){
    if(timed.length) h+=`<div class="arr-divider">Arrived ✓</div>`;
    arrived.forEach(e=>{
      h+=`<div class="arrival-item arr-arrived" onclick="openSlotModal('${e.key}')">
        <div class="arr-time" style="font-size:12px;opacity:.7">arrived ✓</div>
        <div class="arr-name">${flagFor(e.c.nat||'')} ${esc(e.c.name)}</div>
        <div class="arr-room">${esc(e.roomName)} · Bed ${e.bed}</div>
      </div>`;
    });
  }

  if(unknown.length){
    if(timed.length||arrived.length) h+=`<div class="arr-divider">Time unknown</div>`;
    unknown.forEach(e=>{
      h+=`<div class="arrival-item arr-unknown" onclick="openSlotModal('${e.key}')">
        <div class="arr-time" style="font-size:11px;opacity:.5">— time unknown</div>
        <div class="arr-name">${flagFor(e.c.nat||'')} ${esc(e.c.name)}</div>
        <div class="arr-room">${esc(e.roomName)} · Bed ${e.bed}</div>
      </div>`;
    });
  }

  el.innerHTML=h;
}

/* SLOT MODAL */
function statusOpts(cur){
  return STATUSES.map((s,i)=>`<option value="${s}"${cur===s?' selected':''}>${STATUS_LABELS[i]}</option>`).join('');
}
function arrivalOpts(cur){
  return HOURS.map(h=>{
    if(h==='custom') return`<option value="custom"${cur==='custom'?' selected':''}>custom…</option>`;
    if(h==='') return`<option value=""${!cur?' selected':''}>— arrival —</option>`;
    if(h==='arrived') return`<option value="arrived"${cur==='arrived'?' selected':''}>arrived ✓</option>`;
    return`<option value="${h}"${cur===h?' selected':''}>${h}</option>`;
  }).join('');
}
function natOpts(cur){
  const knownVals=NATS.map(n=>n.v);
  const isCustom=cur&&!knownVals.includes(cur);
  let opts=NATS.map(n=>`<option value="${n.v}"${cur===n.v?' selected':''}>${n.l}</option>`).join('');
  if(isCustom) opts+=`<option value="${esc(cur)}" selected>${esc(cur)}</option>`;
  return opts;
}

function openSlotModal(key){
  currentSlotKey=key;
  const c=gc(key);
  document.getElementById('slot-name').value=c.name||'';
  document.getElementById('slot-status').innerHTML=statusOpts(c.status||'');
  document.getElementById('slot-arrival').innerHTML=arrivalOpts(c.arrival||'');
  document.getElementById('slot-nat').innerHTML=natOpts(c.nat||'');

  const knownVals=NATS.map(n=>n.v);
  const isCustomArrival=c.arrival&&!HOURS.includes(c.arrival);
  const isCustomNat=c.nat&&!knownVals.includes(c.nat);

  const arrText=document.getElementById('slot-arrival-text');
  arrText.style.display=isCustomArrival?'block':'none';
  if(isCustomArrival) arrText.value=c.arrival;

  const natText=document.getElementById('slot-nat-text');
  natText.style.display=isCustomNat?'block':'none';
  if(isCustomNat) natText.value=c.nat;

  document.getElementById('slot-delete-btn').style.display=(c.name||c.status)?'inline-block':'none';
  document.getElementById('slot-note-input').value='';
  renderSlotNotes();
  document.getElementById('slot-modal').classList.add('open');
  setTimeout(()=>document.getElementById('slot-name').focus(),50);
}

function onModalArrivalChange(){
  const sel=document.getElementById('slot-arrival');
  const inp=document.getElementById('slot-arrival-text');
  inp.style.display=sel.value==='custom'?'block':'none';
  if(sel.value==='custom') setTimeout(()=>inp.focus(),30);
}
function onModalNatChange(){
  const sel=document.getElementById('slot-nat');
  const inp=document.getElementById('slot-nat-text');
  inp.style.display=sel.value==='custom'?'block':'none';
  if(sel.value==='custom') setTimeout(()=>inp.focus(),30);
}

function saveSlot(){
  if(!currentSlotKey)return;
  const c=gc(currentSlotKey);
  c.name=document.getElementById('slot-name').value.trim();
  c.status=document.getElementById('slot-status').value;
  const arrSel=document.getElementById('slot-arrival');
  c.arrival=arrSel.value==='custom'?document.getElementById('slot-arrival-text').value.trim()||'':arrSel.value;
  const natSel=document.getElementById('slot-nat');
  c.nat=natSel.value==='custom'?document.getElementById('slot-nat-text').value.trim().toUpperCase()||'':natSel.value;
  cells[currentSlotKey]=c;
  save();
  closeSlotModal();
}

function deleteSlot(){
  if(!currentSlotKey)return;
  delete cells[currentSlotKey];
  delete notes[currentSlotKey];
  save();
  closeSlotModal();
}

function closeSlotModal(){
  document.getElementById('slot-modal').classList.remove('open');
  currentSlotKey=null;
  render();
}

/* NOTES IN MODAL */
function renderSlotNotes(){
  const list=gn(currentSlotKey);
  const el=document.getElementById('slot-notes-list');
  if(!list.length){el.innerHTML=`<div class="slot-notes-empty">No notes yet</div>`;return;}
  el.innerHTML=list.map((n,i)=>`
    <div class="slot-note-item">
      <div class="slot-note-text">${esc(n.text)}</div>
      <div class="slot-note-time">${n.time}</div>
      <button class="slot-note-del" onclick="deleteSlotNote(${i})">×</button>
    </div>
  `).join('');
}
function addSlotNote(){
  const text=document.getElementById('slot-note-input').value.trim();
  if(!text||!currentSlotKey)return;
  if(!notes[currentSlotKey])notes[currentSlotKey]=[];
  const now=new Date();
  notes[currentSlotKey].push({text,time:`${p2(now.getDate())}/${p2(now.getMonth()+1)} ${p2(now.getHours())}:${p2(now.getMinutes())}`});
  save();
  document.getElementById('slot-note-input').value='';
  renderSlotNotes();
}
function deleteSlotNote(idx){
  notes[currentSlotKey].splice(idx,1);
  if(!notes[currentSlotKey].length)delete notes[currentSlotKey];
  save();
  renderSlotNotes();
}

/* MONTH */
function monthDays(){
  const n=new Date(),d=new Date(n.getFullYear(),n.getMonth()+monthOff,1),days=[];
  const mo=d.getMonth();
  while(d.getMonth()===mo){days.push(new Date(d));d.setDate(d.getDate()+1);}
  return days;
}
function renderMonth(){
  const days=monthDays(),first=days[0];
  document.getElementById('period-label').textContent=`${MONTHS_LONG[first.getMonth()]} ${first.getFullYear()}`;
  if(!rooms.length){document.getElementById('month-wrap').innerHTML=`<div style="text-align:center;padding:60px 20px;color:var(--muted)"><p style="font-size:15px;color:var(--text);margin-bottom:6px">No rooms yet</p>Click "+ Room" to get started</div>`;return;}
  let h='';
  rooms.forEach(r=>{
    h+=`<div class="month-room"><div class="month-room-head"><span class="month-room-name">${esc(r.name)}</span><span class="month-room-sub">${r.beds} beds</span></div>
    <div class="month-cal"><table class="month-table"><thead><tr>
    <th style="position:sticky;left:0;z-index:6;background:var(--surface);min-width:55px"></th>`;
    days.forEach(d=>h+=`<th class="${isToday(d)?'today-col':''}">${d.getDate()}<br><span style="font-weight:400;font-size:9px">${DAYS[d.getDay()]}</span></th>`);
    h+='</tr></thead><tbody>';
    for(let s=0;s<r.beds;s++){
      h+=`<tr><td class="slot-col-sticky">Bed ${s+1}</td>`;
      days.forEach(d=>{
        const dstr=ds(d),key=ck(r.id,s,dstr),c=gc(key);
        const init=c.name?c.name.split(' ')[0].substring(0,3):'';
        const dotCls=c.status?`md-${c.status}`:'md-empty';
        const hasN=gn(key).length>0;
        h+=`<td class="${isToday(d)?'today-bg':''}"><div class="month-dot ${dotCls}" onclick="jumpToWeek('${dstr}')" title="${esc(c.name)||'—'}${c.arrival?' · '+c.arrival:''}${hasN?' 💬':''}">`;
        if(c.name)h+=`<span>${init}</span>`;
        h+='</div></td>';
      });
      h+='</tr>';
    }
    h+='</tbody></table></div></div>';
  });
  document.getElementById('month-wrap').innerHTML=h;
}

function jumpToWeek(dateStr){
  const d=new Date(dateStr),now=new Date();now.setHours(0,0,0,0);
  const day=d.getDay(),mon=new Date(d);mon.setDate(d.getDate()-(day===0?6:day-1));
  const nowDay=now.getDay(),nowMon=new Date(now);nowMon.setDate(now.getDate()-(nowDay===0?6:nowDay-1));
  weekOff=Math.round((mon-nowMon)/(7*86400000));
  switchView('week');
}

function switchView(v){
  view=v;
  document.getElementById('view-week').style.display=v==='week'?'block':'none';
  document.getElementById('view-month').style.display=v==='month'?'block':'none';
  document.querySelectorAll('.hero-tab').forEach((el,i)=>el.classList.toggle('active',['week','month'][i]===v));
  render();
}
function navPrev(){if(view==='week')weekOff--;else monthOff--;render();}
function navNext(){if(view==='week')weekOff++;else monthOff++;render();}

function openAddRoom(){
  document.getElementById('rm-name').value='';document.getElementById('rm-beds').value='';
  document.getElementById('room-modal').classList.add('open');
  setTimeout(()=>document.getElementById('rm-name').focus(),50);
}
function saveRoom(){
  const name=document.getElementById('rm-name').value.trim(),beds=parseInt(document.getElementById('rm-beds').value)||0;
  if(!name||beds<1)return;rooms.push({id:'r'+Date.now(),name,beds});save();closeModal('room-modal');render();
}
function deleteRoom(id){
  if(!confirm('Delete room and all its data?'))return;
  rooms=rooms.filter(r=>r.id!==id);save();render();
}
function closeModal(id){document.getElementById(id).classList.remove('open');}

/* GUIDELINES */
function glKey(prefix, idx){ return `${prefix}-${ds(new Date())}-${idx}`; }

function renderGuidelines(){
  const now=new Date();
  const mins=now.getHours()*60+now.getMinutes();
  const el=document.getElementById('guidelines-body');

  function taskHtml(t, k){
    const done=!!glDone[k];
    return`<div class="gl-task${done?' done':''}" onclick="glDone['${k}']=!glDone['${k}'];save();renderGuidelines()">
      <div class="gl-check">${done?'✓':''}</div><span>${esc(t)}</span>
    </div>`;
  }

  let h='';

  // Find current and next time block
  let curIdx=-1, nextIdx=-1;
  for(let i=0;i<GL_BLOCKS.length;i++){
    if(mins>=GL_BLOCKS[i].from && mins<GL_BLOCKS[i].to){ curIdx=i; break; }
  }
  if(curIdx===-1){
    for(let i=0;i<GL_BLOCKS.length;i++){
      if(GL_BLOCKS[i].from>mins){ nextIdx=i; break; }
    }
  } else {
    for(let i=curIdx+1;i<GL_BLOCKS.length;i++){
      if(GL_BLOCKS[i].from>=GL_BLOCKS[curIdx].to){ nextIdx=i; break; }
    }
  }

  function blockHtml(idx, cls){
    const b=GL_BLOCKS[idx];
    return`<div class="gl-block ${cls}">
      <div class="gl-block-label">${b.label}</div>
      ${b.tasks.map((t,ti)=>{
        const k=glKey('bl'+idx, ti);
        const done=!!glDone[k];
        return`<div class="gl-task${done?' done':''}" onclick="glDone['${k}']=!glDone['${k}'];save();renderGuidelines()">
          <div class="gl-check">${done?'✓':''}</div><span>${esc(t)}</span>
        </div>`;
      }).join('')}
    </div>`;
  }

  // Apply manual offset
  const baseIdx = curIdx >= 0 ? curIdx : (nextIdx >= 0 ? nextIdx : 0);
  const viewIdx = Math.max(0, Math.min(GL_BLOCKS.length-1, baseIdx + glOffset));
  const viewNext = viewIdx+1 < GL_BLOCKS.length ? viewIdx+1 : -1;

  if(glOffset!==0){
    h+=`<div style="font-size:10px;color:var(--muted);text-align:center;padding:4px 0 2px;font-style:italic">
      ${glOffset<0?'← earlier':'later →'} · <span style="cursor:pointer;text-decoration:underline" onclick="glOffset=0;renderGuidelines()">back to now</span>
    </div>`;
  }

  h+=blockHtml(viewIdx, glOffset===0 && curIdx===viewIdx ? 'current' : 'next-up');
  if(viewNext>=0){
    h+=`<div class="gl-next-label">↓ Coming up: ${GL_BLOCKS[viewNext].label.split('·')[0].trim()}</div>`;
    h+=blockHtml(viewNext,'next-up');
  }

  el.innerHTML=h;
}

function glNav(dir){
  glOffset+=dir;
  const now=new Date(), mins=now.getHours()*60+now.getMinutes();
  let curIdx=-1, nextIdx=-1;
  for(let i=0;i<GL_BLOCKS.length;i++){
    if(mins>=GL_BLOCKS[i].from && mins<GL_BLOCKS[i].to){ curIdx=i; break; }
  }
  if(curIdx===-1) for(let i=0;i<GL_BLOCKS.length;i++){ if(GL_BLOCKS[i].from>mins){ nextIdx=i; break; } }
  const baseIdx = curIdx>=0 ? curIdx : (nextIdx>=0 ? nextIdx : 0);
  glOffset = Math.max(-baseIdx, Math.min(GL_BLOCKS.length-1-baseIdx, glOffset));
  renderGuidelines();
}

function openFullGuidelines(){
  const el=document.getElementById('full-gl-body');
  const now=new Date();
  const mins=now.getHours()*60+now.getMinutes();

  function sectionHtml(title, tasks, color){
    return`<div style="margin-bottom:18px">
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:${color};margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid ${color}40">${title}</div>
      ${tasks.map(t=>`<div style="font-size:13px;line-height:1.55;padding:3px 0 3px 12px;border-left:2px solid ${color}40;margin-bottom:3px;color:var(--text)">${esc(t)}</div>`).join('')}
    </div>`;
  }

  let h=sectionHtml('Check-in Steps', CHECKIN_STEPS, '#f0a800');
  h+=sectionHtml('Check-out', CHECKOUT_STEPS, '#17c4aa');
  h+=`<div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:12px;margin-top:4px">Daily Schedule</div>`;
  GL_BLOCKS.forEach((b,i)=>{
    const active=mins>=b.from&&mins<b.to;
    h+=`<div style="margin-bottom:14px${active?';background:#f0f5ff;border-radius:8px;padding:8px;margin-left:-8px;margin-right:-8px':''}">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:${active?'#3a6fd4':'var(--muted)'};margin-bottom:6px">${b.label}</div>
      ${b.tasks.map(t=>`<div style="font-size:12.5px;line-height:1.5;padding:2px 0 2px 10px;border-left:2px solid ${active?'#3a6fd4':'var(--border)'};margin-bottom:2px">${esc(t)}</div>`).join('')}
    </div>`;
  });

  el.innerHTML=h;
  document.getElementById('full-gl-modal').classList.add('open');
}

function render(){
  if(view==='week') renderWeek(); else renderMonth();
  renderArrivals();
  renderGuidelines();
}

document.querySelectorAll('.overlay').forEach(el=>el.addEventListener('click',e=>{
  if(e.target===el){
    if(el.id==='slot-modal') closeSlotModal();
    else el.classList.remove('open');
  }
}));
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('slot-modal').classList.contains('open')) closeSlotModal();
    else document.querySelectorAll('.overlay.open').forEach(el=>el.classList.remove('open'));
  }
});

load();render();

function applyScale(){
  const DESIGN_W=2080;
  const scale=Math.min(1,window.innerWidth/DESIGN_W);
  document.body.style.zoom=scale;
}
applyScale();
window.addEventListener('resize',applyScale);
</script>
