<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hostel Board</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f6f3;
  --surface:#fff;
  --border:#e5e3de;
  --text:#181816;
  --muted:#9a9891;
  --s-checkin:#f0d800;
  --s-unpaid:#e63c3c;
  --s-change:#17c4aa;
  --s-paid-noci:#3a6fd4;
  --s-occupied:#181816;
  --s-free:#e8f4de;
  --radius:10px;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* NAV */
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:16px;height:52px;position:sticky;top:0;z-index:50}
.nav-title{font-size:15px;font-weight:600;letter-spacing:-.01em}
.nav-tabs{display:flex;gap:2px;margin-left:auto}
.nav-tab{padding:5px 14px;font-size:12px;font-weight:500;border:none;border-radius:7px;cursor:pointer;background:none;color:var(--muted)}
.nav-tab.active{background:var(--text);color:#fff}
.nav-btn{padding:5px 13px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:7px;cursor:pointer;background:none;color:var(--text);margin-left:8px}
.nav-btn:hover{background:var(--bg)}

/* SUMMARY STRIP */
.summary{display:flex;gap:8px;padding:16px 20px 0;flex-wrap:wrap}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;display:flex;flex-direction:column;gap:2px;min-width:100px}
.sum-n{font-size:22px;font-weight:600;line-height:1}
.sum-l{font-size:11px;color:var(--muted);margin-top:2px}
.sum-checkin .sum-n{color:#b89e00}
.sum-unpaid .sum-n{color:#e63c3c}
.sum-free .sum-n{color:#3a7d1e}

/* DATE HEADER */
.date-header{display:flex;gap:12px;padding:16px 20px 0}
.date-col{flex:1;display:flex;align-items:baseline;gap:8px}
.date-big{font-size:18px;font-weight:600}
.date-sub{font-size:13px;color:var(--muted)}
.date-today{color:var(--text)}
.date-tomorrow{color:var(--muted)}

/* ROOMS */
.rooms{padding:14px 20px 80px;display:flex;flex-direction:column;gap:12px}
.room-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.room-head{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:10px}
.room-name{font-size:13px;font-weight:600;flex:1}
.room-count{font-size:11px;color:var(--muted);background:var(--bg);padding:2px 8px;border-radius:5px}
.room-del{border:none;background:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:0 4px}
.room-del:hover{color:#e63c3c}

/* BED GRID */
.bed-grid{display:grid;grid-template-columns:100px 1fr 1fr;border-bottom:1px solid var(--border)}
.bed-grid:last-child{border-bottom:none}
.bed-label-col{padding:8px 12px 8px 16px;display:flex;align-items:center;font-size:11px;color:var(--muted);border-right:1px solid var(--border)}
.bed-cell{padding:6px 10px;border-right:1px solid var(--border);cursor:pointer;min-height:44px;display:flex;flex-direction:column;justify-content:center;transition:filter .1s}
.bed-cell:last-child{border-right:none}
.bed-cell:hover{filter:brightness(.95)}
.bed-col-header{background:var(--bg);padding:6px 10px;font-size:11px;font-weight:500;color:var(--muted);display:flex;align-items:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.bed-col-header:last-child{border-right:none}
.bed-col-header.is-today{color:var(--text)}

.s-free{background:var(--s-free)}
.s-checkin{background:var(--s-checkin)}
.s-unpaid{background:var(--s-unpaid)}
.s-change{background:var(--s-change)}
.s-paid-noci{background:var(--s-paid-noci)}
.s-occupied{background:#fff}

.guest-name{font-size:12px;font-weight:600;line-height:1.2;color:var(--text)}
.s-unpaid .guest-name,.s-paid-noci .guest-name{color:#fff}
.s-change .guest-name{color:#0a6b5a}
.s-checkin .guest-name{color:#6b5800}
.guest-note{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.3}
.s-unpaid .guest-note,.s-paid-noci .guest-note{color:rgba(255,255,255,.75)}
.s-change .guest-note{color:#0a6b5a}
.s-checkin .guest-note{color:#7a6600}

/* WEEK VIEW */
.week-nav{display:flex;align-items:center;gap:10px;padding:16px 20px 0}
.week-nav button{border:1px solid var(--border);background:none;border-radius:7px;padding:5px 13px;cursor:pointer;font-size:12px;color:var(--text)}
.week-nav button:hover{background:var(--surface)}
.week-label{font-size:13px;color:var(--muted)}
.week-scroll{overflow-x:auto;padding:12px 20px 80px}
.week-table{border-collapse:collapse;min-width:700px;width:100%}
.week-table th{background:var(--surface);padding:8px 10px;font-size:11px;font-weight:500;color:var(--muted);border:1px solid var(--border);text-align:left;white-space:nowrap;position:sticky;top:52px}
.week-table th.is-today{color:var(--text);background:var(--bg)}
.week-table td{border:1px solid var(--border);padding:0;min-width:100px;vertical-align:top}
.week-table .td-label{padding:8px 12px;font-size:11px;color:var(--muted);background:var(--surface);white-space:nowrap;font-weight:500}
.week-table .td-room{padding:6px 10px;font-size:10px;font-weight:600;color:var(--muted);background:var(--bg);text-transform:uppercase;letter-spacing:.05em}
.week-cell{padding:5px 8px;min-height:36px;cursor:pointer;height:100%;display:flex;flex-direction:column;justify-content:center}
.week-cell:hover{filter:brightness(.93)}
.week-cell .guest-name{font-size:11px}
.week-cell .guest-note{font-size:10px}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:14px;padding:1.5rem;width:100%;max-width:340px;box-shadow:0 12px 40px rgba(0,0,0,.15)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:1.2rem}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text);font-family:inherit}
.field textarea{resize:vertical;min-height:64px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:1.2rem}
.btn{padding:8px 16px;font-size:13px;font-weight:500;border-radius:8px;border:1px solid var(--border);cursor:pointer;background:none;color:var(--text)}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn-primary:hover{background:#333}
.btn-danger{color:#e63c3c;border-color:rgba(230,60,60,.3)}
.btn-danger:hover{background:#fff0f0}

/* ADD ROOM MODAL */
.add-room-form{display:flex;flex-direction:column;gap:10px}

/* LEGEND */
.legend{display:flex;gap:10px;padding:10px 20px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.leg-dot{width:11px;height:11px;border-radius:3px;border:1px solid rgba(0,0,0,.08)}

/* FAB */
.fab{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;border:none;border-radius:50px;padding:12px 20px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:40}
.fab:hover{background:#333}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty p{font-size:15px;margin-bottom:8px;color:var(--text)}
.empty span{font-size:13px}
</style>
</head>
<body>

<nav>
  <span class="nav-title">🏨 Hostel Board</span>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchView('today')">Dnes / Zítra</button>
    <button class="nav-tab" onclick="switchView('week')">Týden</button>
  </div>
  <button class="nav-btn" onclick="openAddRoom()">+ Přidat pokoj</button>
</nav>

<div id="view-today">
  <div class="summary" id="summary"></div>
  <div class="legend">
    <span class="leg"><span class="leg-dot" style="background:#f0d800"></span>check-in (not paid)</span>
    <span class="leg"><span class="leg-dot" style="background:#e63c3c"></span>not paid</span>
    <span class="leg"><span class="leg-dot" style="background:#17c4aa"></span>change room</span>
    <span class="leg"><span class="leg-dot" style="background:#3a6fd4"></span>paid, not checked in</span>
    <span class="leg"><span class="leg-dot" style="background:#fff;border-color:#ccc"></span>occupied</span>
    <span class="leg"><span class="leg-dot" style="background:#e8f4de"></span>free</span>
  </div>
  <div class="date-header">
    <div class="date-col"><span class="date-big date-today" id="date-today"></span><span class="date-sub">dnes</span></div>
    <div class="date-col"><span class="date-big date-tomorrow" id="date-tomorrow"></span><span class="date-sub">zítra</span></div>
  </div>
  <div class="rooms" id="rooms-today"></div>
</div>

<div id="view-week" style="display:none">
  <div class="week-nav">
    <button onclick="changeWeek(-1)">‹</button>
    <span class="week-label" id="week-label"></span>
    <button onclick="changeWeek(1)">›</button>
  </div>
  <div class="week-scroll">
    <table class="week-table" id="week-table"></table>
  </div>
</div>

<!-- Cell modal -->
<div class="overlay" id="cell-modal">
  <div class="modal">
    <h3 id="cell-modal-title">Upravit</h3>
    <div class="field"><label>Jméno hosta</label><input id="cm-name" placeholder="např. Anna UK"></div>
    <div class="field"><label>Status</label>
      <select id="cm-status">
        <option value="free">Volné</option>
        <option value="occupied">Occupied (paid)</option>
        <option value="checkin">Check-in day (not paid yet)</option>
        <option value="unpaid">Not paid</option>
        <option value="change">Change beds / room</option>
        <option value="paid-noci">Paid, not checked in</option>
      </select>
    </div>
    <div class="field"><label>Poznámka</label><textarea id="cm-note" placeholder="např. arrives 9:30pm, owes €55..."></textarea></div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="clearCell()">Vymazat</button>
      <button class="btn" onclick="closeModal('cell-modal')">Zrušit</button>
      <button class="btn btn-primary" onclick="saveCell()">Uložit</button>
    </div>
  </div>
</div>

<!-- Add room modal -->
<div class="overlay" id="room-modal">
  <div class="modal">
    <h3>Přidat pokoj</h3>
    <div class="add-room-form">
      <div class="field"><label>Název pokoje</label><input id="rm-name" placeholder="např. Room 1, Dorm A..."></div>
      <div class="field"><label>Počet lůžek</label><input id="rm-beds" type="number" min="1" max="30" placeholder="6"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('room-modal')">Zrušit</button>
      <button class="btn btn-primary" onclick="saveRoom()">Přidat</button>
    </div>
  </div>
</div>

<script>
const DAYS=['ne','po','út','st','čt','pá','so'];
const MONTHS=['ledna','února','března','dubna','května','června','července','srpna','září','října','listopadu','prosince'];

let rooms=[], cells={}, weekOffset=0, currentView='today', editingKey=null;

function load(){
  try{const r=localStorage.getItem('hb_rooms');if(r)rooms=JSON.parse(r);}catch{}
  try{const r=localStorage.getItem('hb_cells');if(r)cells=JSON.parse(r);}catch{}
  if(!rooms.length){
    rooms=[
      {id:'r1',name:'Room 1',beds:8},
      {id:'r2',name:'Room 2',beds:10},
      {id:'r3',name:'Room 3',beds:4},
      {id:'r4',name:'Room 4',beds:4},
    ];
  }
}
function save(){
  try{localStorage.setItem('hb_rooms',JSON.stringify(rooms));}catch{}
  try{localStorage.setItem('hb_cells',JSON.stringify(cells));}catch{}
}

function cellKey(roomId,bedIdx,dateStr){return`${roomId}-${bedIdx}-${dateStr}`;}
function getCell(key){return cells[key]||{name:'',status:'free',note:''};}

function fmtDate(d){return`${d.getDate()} ${MONTHS[d.getMonth()]}`;}
function fmtDateShort(d){return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;}
function dateStr(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function isToday(d){const n=new Date();return dateStr(d)===dateStr(n);}

function getToday(){const d=new Date();d.setHours(0,0,0,0);return d;}
function getTomorrow(){const d=getToday();d.setDate(d.getDate()+1);return d;}

// SUMMARY
function calcSummary(dates){
  let checkin=0,unpaid=0,free=0,total=0;
  dates.forEach(d=>{
    const ds=dateStr(d);
    rooms.forEach(r=>{
      for(let b=0;b<r.beds;b++){
        total++;
        const c=getCell(cellKey(r.id,b,ds));
        if(c.status==='free')free++;
        if(c.status==='checkin')checkin++;
        if(c.status==='unpaid')unpaid++;
      }
    });
  });
  return{checkin,unpaid,free,total};
}

function renderSummary(){
  const today=getToday(),tmrw=getTomorrow();
  const s=calcSummary([today,tmrw]);
  document.getElementById('summary').innerHTML=`
    <div class="sum-card sum-checkin"><div class="sum-n">${s.checkin}</div><div class="sum-l">check-in dnes/zítra</div></div>
    <div class="sum-card sum-unpaid"><div class="sum-n">${s.unpaid}</div><div class="sum-l">nezaplaceno</div></div>
    <div class="sum-card sum-free"><div class="sum-n">${s.free}</div><div class="sum-l">volných lůžek</div></div>
  `;
}

// TODAY VIEW
function renderToday(){
  const today=getToday(),tmrw=getTomorrow();
  const tds=dateStr(today),tmds=dateStr(tmrw);
  document.getElementById('date-today').textContent=`${DAYS[today.getDay()]} ${fmtDate(today)}`;
  document.getElementById('date-tomorrow').textContent=`${DAYS[tmrw.getDay()]} ${fmtDate(tmrw)}`;
  renderSummary();

  if(!rooms.length){
    document.getElementById('rooms-today').innerHTML=`<div class="empty"><p>Zatím žádné pokoje</p><span>Klikni na "+ Přidat pokoj" a začni</span></div>`;
    return;
  }

  let html='';
  rooms.forEach(r=>{
    html+=`<div class="room-card">
      <div class="room-head">
        <span class="room-name">${r.name}</span>
        <span class="room-count">${r.beds} lůžek</span>
        <button class="room-del" onclick="deleteRoom('${r.id}')" title="Smazat pokoj">×</button>
      </div>
      <div class="bed-col-header" style="display:grid;grid-template-columns:100px 1fr 1fr">
        <div class="bed-col-header" style="border:none;padding:6px 12px 6px 16px"></div>
        <div class="bed-col-header is-today" style="border:none">dnes</div>
        <div class="bed-col-header" style="border:none">zítra</div>
      </div>`;
    for(let b=0;b<r.beds;b++){
      const k1=cellKey(r.id,b,tds),k2=cellKey(r.id,b,tmds);
      const c1=getCell(k1),c2=getCell(k2);
      html+=`<div class="bed-grid">
        <div class="bed-label-col">Lůžko ${b+1}</div>
        <div class="bed-cell s-${c1.status}" onclick="openCell('${k1}','${r.name} · Lůžko ${b+1} · dnes')">${cellHtml(c1)}</div>
        <div class="bed-cell s-${c2.status}" onclick="openCell('${k2}','${r.name} · Lůžko ${b+1} · zítra')">${cellHtml(c2)}</div>
      </div>`;
    }
    html+='</div>';
  });
  document.getElementById('rooms-today').innerHTML=html;
}

function cellHtml(c){
  if(!c.name||c.status==='free')return'';
  return`<div class="guest-name">${c.name}</div>${c.note?`<div class="guest-note">${c.note}</div>`:''}`;
}

// WEEK VIEW
function getWeekDays(){
  const now=new Date(),day=now.getDay(),monday=new Date(now);
  monday.setDate(now.getDate()-(day===0?6:day-1)+weekOffset*7);
  monday.setHours(0,0,0,0);
  return Array.from({length:7},(_,i)=>{const d=new Date(monday);d.setDate(monday.getDate()+i);return d;});
}

function renderWeek(){
  const days=getWeekDays();
  document.getElementById('week-label').textContent=`${fmtDateShort(days[0])} – ${fmtDateShort(days[6])} · ${days[0].getFullYear()}`;
  let html=`<thead><tr><th style="min-width:110px;position:sticky;left:0;z-index:10;background:#fff">Pokoj / Lůžko</th>`;
  days.forEach(d=>{html+=`<th class="${isToday(d)?'is-today':''}">${DAYS[d.getDay()]} ${fmtDateShort(d)}</th>`;});
  html+='</tr></thead><tbody>';
  rooms.forEach(r=>{
    html+=`<tr><td colspan="8" class="td-room">${r.name}</td></tr>`;
    for(let b=0;b<r.beds;b++){
      html+=`<tr><td class="td-label" style="position:sticky;left:0;z-index:5;background:#fff">Lůžko ${b+1}</td>`;
      days.forEach(d=>{
        const ds=dateStr(d),key=cellKey(r.id,b,ds),c=getCell(key);
        html+=`<td class="s-${c.status}"><div class="week-cell" onclick="openCell('${key}','${r.name} · Lůžko ${b+1} · ${fmtDateShort(d)}')">${cellHtml(c)}</div></td>`;
      });
      html+='</tr>';
    }
  });
  html+='</tbody>';
  document.getElementById('week-table').innerHTML=html;
}

function changeWeek(dir){weekOffset+=dir;renderWeek();}

// SWITCHING
function switchView(v){
  currentView=v;
  document.getElementById('view-today').style.display=v==='today'?'block':'none';
  document.getElementById('view-week').style.display=v==='week'?'block':'none';
  document.querySelectorAll('.nav-tab').forEach((el,i)=>el.classList.toggle('active',['today','week'][i]===v));
  if(v==='today')renderToday();else renderWeek();
}

// CELL MODAL
function openCell(key,title){
  editingKey=key;
  const c=getCell(key);
  document.getElementById('cell-modal-title').textContent=title;
  document.getElementById('cm-name').value=c.name||'';
  document.getElementById('cm-status').value=c.status||'free';
  document.getElementById('cm-note').value=c.note||'';
  document.getElementById('cell-modal').classList.add('open');
  setTimeout(()=>document.getElementById('cm-name').focus(),50);
}
function saveCell(){
  cells[editingKey]={name:document.getElementById('cm-name').value.trim(),status:document.getElementById('cm-status').value,note:document.getElementById('cm-note').value.trim()};
  save();closeModal('cell-modal');render();
}
function clearCell(){
  delete cells[editingKey];
  save();closeModal('cell-modal');render();
}

// ROOM MODAL
function openAddRoom(){
  document.getElementById('rm-name').value='';
  document.getElementById('rm-beds').value='';
  document.getElementById('room-modal').classList.add('open');
  setTimeout(()=>document.getElementById('rm-name').focus(),50);
}
function saveRoom(){
  const name=document.getElementById('rm-name').value.trim();
  const beds=parseInt(document.getElementById('rm-beds').value)||0;
  if(!name||beds<1)return;
  rooms.push({id:'r'+Date.now(),name,beds});
  save();closeModal('room-modal');render();
}
function deleteRoom(id){
  if(!confirm('Smazat pokoj? Data lůžek zůstanou uložená.'))return;
  rooms=rooms.filter(r=>r.id!==id);
  save();render();
}

function closeModal(id){document.getElementById(id).classList.remove('open');}
function render(){if(currentView==='today')renderToday();else renderWeek();}

document.querySelectorAll('.overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')document.querySelectorAll('.overlay.open').forEach(el=>el.classList.remove('open'));
  if(e.key==='Enter'&&e.ctrlKey&&document.getElementById('cell-modal').classList.contains('open'))saveCell();
});

load();render();
</script>
</body>
</html>
